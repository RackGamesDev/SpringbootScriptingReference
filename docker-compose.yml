services: 
  backend:
    build:
      context: ./
      dockerfile: Dockerfile 
    environment:
      DATABASE_URL: ${DATABASE_URL}
    networks:
      - the-network
    depends_on:
      - db

  db:
    image: postgres:13
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - ./.docker/database:/var/lib/postgresql/data
    networks:
      - the-network
networks:
  the-network:
  esnet:
    driver: bridge